# version attribute removed — deprecated in recent Docker Compose versions

services:
  postgres:
    image: postgres:16-alpine
    container_name: aegis_postgres
    environment:
      POSTGRES_DB: aegis_db
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aegis_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aegis_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # No healthcheck: Qdrant uses a distroless image with no shell tools

  minio:
    image: minio/minio:latest
    container_name: aegis_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aegis_admin
      MINIO_ROOT_PASSWORD: aegis_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Ollama removed from Docker ──────────────────────────────────────────────
  # Ollama runs natively on the host to save disk space.
  # Install from: https://ollama.com/download/windows
  # Then run:  ollama serve
  # The api service reaches it via host.docker.internal:11434

  api:
    build: .
    container_name: aegis_api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://aegis:aegis_secret@postgres:5432/aegis_db
      REDIS_URL: redis://redis:6379
      # Ollama runs natively on host — reachable via host.docker.internal from inside Docker
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: phi3:mini
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MINIO_ENDPOINT: minio:9000
      SECRET_KEY: change-me-in-production-use-strong-random-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: production
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  # ollama_data removed — Ollama runs natively on host
