name: CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.prepare.outputs.image_name }}
    steps:
      - id: prepare
        run: |
          # Use repository owner and ensure it's lowercase for GHCR
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${OWNER}/aegis-api" >> $GITHUB_OUTPUT

  publish:
    name: Build & Push Image
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.setup.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: [publish, setup]
    if: github.ref == 'refs/heads/main'
    environment:
      name: "staging"
      url: "${{ vars.STAGING_URL }}"
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          script: |
            set -e
            mkdir -p /opt/glimmora/aegis
            cd /opt/glimmora/aegis

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            IMAGE_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
            export AEGIS_IMAGE="${{ env.REGISTRY }}/${{ needs.setup.outputs.image_name }}:${IMAGE_TAG}"
            # Disable dev overrides for staging
            export AEGIS_DEV_MOUNT="/app"
            export AEGIS_DEV_COMMAND="uvicorn app.main:app --host 0.0.0.0 --port 8000"

            docker compose pull api
            docker compose up -d --no-deps --wait api
            docker compose exec -T api alembic upgrade head
            docker image prune -f

      - name: Smoke test
        run: |
          sleep 5
          curl --fail --retry 5 --retry-delay 3 \
            "${{ vars.STAGING_URL }}/health"

  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: [publish, setup]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: "production"
      url: "${{ vars.PROD_URL }}"
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -e
            mkdir -p /opt/glimmora/aegis
            cd /opt/glimmora/aegis

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export AEGIS_IMAGE="${{ env.REGISTRY }}/${{ needs.setup.outputs.image_name }}:${{ github.ref_name }}"
            # Disable dev overrides for production
            export AEGIS_DEV_MOUNT="/app"
            export AEGIS_DEV_COMMAND="uvicorn app.main:app --host 0.0.0.0 --port 8000"

            docker compose pull api
            docker compose up -d --no-deps --wait api
            docker compose exec -T api alembic upgrade head
            docker image prune -f

      - name: Smoke test
        run: |
          sleep 5
          curl --fail --retry 5 --retry-delay 3 \
            "${{ vars.PROD_URL }}/health"
